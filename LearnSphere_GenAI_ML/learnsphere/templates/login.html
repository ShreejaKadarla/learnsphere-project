<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LearnSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#020817;--card:#0F1F35;--border:rgba(0,212,255,0.15);--accent:#00D4FF;--accent2:#7C3AED;--text:#E2E8F0;--muted:#64748B;--success:#10B981;--danger:#EF4444;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
        canvas{position:fixed;inset:0;z-index:0;opacity:0.4;}
        .auth-wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:1rem;}
        .logo{text-align:center;margin-bottom:2rem;}
        .logo-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--text);}
        .logo-title span{color:var(--accent);}
        .logo-sub{color:var(--muted);font-size:0.85rem;margin-top:0.25rem;}
        .auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;box-shadow:0 0 60px rgba(0,212,255,0.06);}
        .tabs{display:flex;margin-bottom:2rem;background:rgba(0,0,0,0.3);border-radius:10px;padding:4px;}
        .tab{flex:1;padding:0.6rem;border-radius:8px;background:none;border:none;color:#64748B;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Space Grotesk',sans-serif;}
        .tab.active{background:rgba(0,212,255,0.15);color:var(--accent);}
        .form-group{margin-bottom:1.2rem;}
        label{display:block;font-size:0.8rem;color:#94A3B8;font-weight:600;margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.04em;}
        input,select{width:100%;padding:0.75rem 1rem;border-radius:10px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);color:var(--text);font-size:0.9rem;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color 0.2s;}
        input:focus,select:focus{border-color:var(--accent);}
        select option{background:#0F1F35;}
        .role-select{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
        .role-option{padding:0.75rem;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.3);cursor:pointer;text-align:center;transition:all 0.2s;}
        .role-option.active{border-color:var(--accent);background:rgba(0,212,255,0.1);}
        .role-option .ri{font-size:1.4rem;margin-bottom:0.3rem;}
        .role-option span{display:block;font-size:0.8rem;font-weight:600;}
        .btn{width:100%;padding:0.85rem;border-radius:10px;background:linear-gradient(135deg,var(--accent),#0099CC);border:none;color:#000;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all 0.2s;margin-top:0.5rem;}
        .btn:hover{box-shadow:0 0 25px rgba(0,212,255,0.4);transform:translateY(-1px);}
        .btn:disabled{opacity:0.6;cursor:default;transform:none;}
        .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.65rem 1rem;color:#FCA5A5;font-size:0.85rem;margin-top:1rem;display:none;}
        .demo-accounts{margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.06);}
        .demo-title{font-size:0.75rem;color:var(--muted);text-align:center;margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.05em;}
        .demo-btns{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
        .demo-btn{padding:0.5rem 0.75rem;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.3);color:#94A3B8;font-size:0.78rem;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'Space Grotesk',sans-serif;}
        .demo-btn:hover{border-color:var(--accent);color:var(--accent);}
        .panel{display:none;} .panel.active{display:block;}
    </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="auth-wrap">
    <div class="logo">
        <div class="logo-title">Learn<span>Sphere</span></div>
        <div class="logo-sub">AI-Powered Machine Learning Platform</div>
    </div>
    <div class="auth-card">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Sign In</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login -->
        <div class="panel active" id="login-panel">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <div class="error-msg" id="loginError"></div>
            <button class="btn" onclick="doLogin()" id="loginBtn">Sign In</button>
            <div class="demo-accounts">
                <div class="demo-title">Demo Accounts</div>
                <div class="demo-btns">
                    <button class="demo-btn" onclick="fillDemo('student@learnsphere.com','student123')">👨‍🎓 Student Demo</button>
                    <button class="demo-btn" onclick="fillDemo('educator@learnsphere.com','admin123')">👩‍🏫 Educator Demo</button>
                </div>
            </div>
        </div>

        <!-- Register -->
        <div class="panel" id="register-panel">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Your Name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPw" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>I am a...</label>
                <div class="role-select">
                    <div class="role-option active" id="role-student" onclick="setRole('student')">
                        <div class="ri">👨‍🎓</div>
                        <span>Student</span>
                    </div>
                    <div class="role-option" id="role-educator" onclick="setRole('educator')">
                        <div class="ri">👩‍🏫</div>
                        <span>Educator</span>
                    </div>
                </div>
            </div>
            <div class="error-msg" id="regError"></div>
            <button class="btn" onclick="doRegister()" id="regBtn">Create Account</button>
        </div>
    </div>
</div>

<script>
let selectedRole = 'student';

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tab+'-panel').classList.add('active');
}

function setRole(role) {
    selectedRole = role;
    document.getElementById('role-student').classList.toggle('active', role==='student');
    document.getElementById('role-educator').classList.toggle('active', role==='educator');
}

function fillDemo(email, pw) {
    document.getElementById('loginEmail').value = email;
    document.getElementById('loginPw').value = pw;
}

async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    btn.disabled = true; btn.textContent = 'Signing in...';
    errEl.style.display = 'none';
    const res = await fetch('/api/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email:document.getElementById('loginEmail').value, password:document.getElementById('loginPw').value})
    });
    const data = await res.json();
    if (data.success) {
        window.location = data.role==='educator' ? '/educator/dashboard' : '/student/dashboard';
    } else {
        errEl.textContent = data.error; errEl.style.display = 'block';
        btn.disabled=false; btn.textContent='Sign In';
    }
}

async function doRegister() {
    const btn = document.getElementById('regBtn');
    const errEl = document.getElementById('regError');
    btn.disabled=true; btn.textContent='Creating...'; errEl.style.display='none';
    const res = await fetch('/api/auth/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username:document.getElementById('regName').value, email:document.getElementById('regEmail').value, password:document.getElementById('regPw').value, role:selectedRole})
    });
    const data = await res.json();
    if (data.success) {
        errEl.style.background='rgba(16,185,129,0.1)'; errEl.style.borderColor='rgba(16,185,129,0.3)'; errEl.style.color='#6EE7B7';
        errEl.textContent='Account created! Please sign in.'; errEl.style.display='block';
        setTimeout(()=>switchTab('login'),1500);
    } else {
        errEl.textContent=data.error; errEl.style.display='block';
    }
    btn.disabled=false; btn.textContent='Create Account';
}

// BG canvas
const canvas=document.getElementById('bg'); const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
const nodes=[]; for(let i=0;i<50;i++) nodes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+1});
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<120){ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.strokeStyle=`rgba(0,212,255,${0.12*(1-d/120)})`;ctx.lineWidth=.5;ctx.stroke();}}}nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>canvas.width)n.vx*=-1;if(n.y<0||n.y>canvas.height)n.vy*=-1;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle='rgba(0,212,255,0.5)';ctx.fill();});requestAnimationFrame(draw);}
draw();
</script>
</body>
</html>
